<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Feyhaven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="col">
    <div class="row p">
        <div class="col p g">
            <div class="flex col bg_grey">
                <div class="flex"></div>
                <div id="joy_bar_gain"></div>
                <div id="joy_bar"></div>
            </div>
            <div>
                <span id="joy">0</span> + <span id="joy_gain">0</span>
                <br>
                / 365
            </div>
            <button id="end_turn" class="circle">
                end turn<br><span id="turn">1</span>/4
            </button>
        </div>
        <div>
            <div id="cards" class="col g p">
                <div class="row g">
                    <div id="card_0" class="card_slot"></div>
                    <div id="card_1" class="card_slot"></div>
                    <div id="card_2" class="card_slot"></div>
                    <div id="card_3" class="card_slot"></div>
                </div>
                <div class="row g">
                    <div id="card_4" class="card_slot"></div>
                    <div id="card_5" class="card_slot"></div>
                    <div id="card_6" class="card_slot"></div>
                    <div id="card_7" class="card_slot"></div>
                </div>
            </div>
            <div id="info" class="flex row g p">
                <span class="tip"><span id="deck_count">0</span> cards in the deck</span>
                and
                <span class="tip"><span id="used_count">0</span> cards used</span>
            </div>
        </div>
        <div id="log" class="flex"></div>
    </div>
    <div id="popup" class="hide"></div>
</body>
<script src="./src/main.js" type="module"></script>
</html>
